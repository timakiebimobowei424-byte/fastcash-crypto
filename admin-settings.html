
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Settings - FastCash Crypto</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#081120;color:white;padding:20px}
h1{margin-bottom:20px}
.box{
background:#111827;
padding:20px;
border-radius:20px;
margin-bottom:20px
}
input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
background:#1f2937;
color:white
}
button{
margin-top:15px;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer
}
</style>
</head>

<body>

<h1>Settings</h1>

<div class="box">

<h3>Change Admin Email</h3>

<input
id="adminEmail"
placeholder="New Admin Email">

<button id="saveBtn">

Save

</button>

</div>

<div class="box">

<h3>System Status</h3>

<p id="status">

Operational

</p>

</div>

<script>

document
.getElementById("saveBtn")
.onclick=()=>{

const email=
document
.getElementById("adminEmail")
.value;

if(!email){

alert(
"Enter email"
);

return;

}

alert(
"Admin settings saved"
);

}

</script>

</body>
</html>
