<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Fund User</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

visibility:hidden;
background:#081120;
color:white;
padding:20px;

}

.box{

background:#111827;
padding:25px;
border-radius:20px;
max-width:500px;
margin:auto;

}

h1{

margin-bottom:20px;

}

input{

width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#1f2937;
color:white;
margin-bottom:15px;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;

}

#status{

margin-top:15px;
text-align:center;

}

</style>

</head>

<body>

<div class="box">

<h1>
Fund User
</h1>

<input id="email" placeholder="User UID">

<input
id="amount"
type="number"
placeholder="Amount">

<button id="fundBtn">

Fund User

</button>

<div id="status"></div>

</div>

<script
type="module"
src="./admin.fund.js">
</script>

<script
type="module"
src="./admin.guard.js">
</script>

</body>
</html>
