<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>FastCash Crypto Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#081120;
overflow:hidden;
color:white;
}

body::before{
content:"";
position:fixed;
width:450px;
height:450px;
background:#22c55e;
filter:blur(170px);
top:-150px;
left:-150px;
opacity:.15;
}

body::after{
content:"";
position:fixed;
width:450px;
height:450px;
background:#3b82f6;
filter:blur(170px);
bottom:-150px;
right:-150px;
opacity:.15;
}

.box{
width:92%;
max-width:420px;
background:
rgba(17,24,39,.95);
padding:30px;
border-radius:25px;
z-index:2;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#94a3b8;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
margin-bottom:15px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

#status{
text-align:center;
margin-top:15px;
}

</style>

</head>

<body>

<div class="box">

<h1>Admin Login</h1>

<p>
FastCash Crypto Portal
</p>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<div id="status"></div>

</div>

<script type="module"
src="./admin.login.js">

</script>

</body>
</html>
