<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1c2433;
padding:20px;
border-radius:15px;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:green;
color:white;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="email" placeholder="Admin Email">

<input id="password"
type="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

</div>

<script type="module"
src="admin-login.js">
</script>

</body>

</html>
