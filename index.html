<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mark's Investment Limited</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0f172a;
color: white;
}

/* HEADER */
header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px;
background: #111827;
}

.logo {
font-weight: bold;
}

button {
padding: 10px 15px;
border: none;
cursor: pointer;
border-radius: 5px;
}

.primary {
background: #22c55e;
color: white;
}

.secondary {
background: #3b82f6;
color: white;
}

/* HERO */
.hero {
height: 90vh;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
text-align: center;
padding: 20px;
}

.hero h1 {
font-size: 40px;
}

/* MODAL */
.modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.8);
}

.modal-content {
background: white;
color: black;
width: 300px;
margin: 100px auto;
padding: 20px;
border-radius: 10px;
display: flex;
flex-direction: column;
gap: 10px;
}

input {
padding: 10px;
}

.close {
text-align: right;
cursor: pointer;
font-size: 18px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="logo">Mark's Investment Limited</div>

<div>
<button class="primary" id="openRegister">Open Account</button>

<button class="secondary" onclick="window.location.href='login.html'">
Login
</button>
</div>
</header>

<!-- HERO -->
<section class="hero">
<h1>Invest Smart, Grow Fast</h1>
<p>Secure digital investment platform</p>
<button class="primary" id="heroRegister">Get Started</button>
</section>

<!-- REGISTER MODAL -->
<div id="registerModal" class="modal">
<div class="modal-content">

<div class="close" id="closeModal">✖</div>

<h3>Create Account</h3>

<input type="text" id="fullname" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="primary" id="registerBtn">Create Account</button>

</div>
</div>

<script type="module" src="auth.js"></script>

<script>
const modal = document.getElementById("registerModal");

document.getElementById("openRegister").onclick =
() => modal.style.display = "block";

document.getElementById("heroRegister").onclick =
() => modal.style.display = "block";

document.getElementById("closeModal").onclick =
() => modal.style.display = "none";

window.onclick = function(e){
if(e.target == modal){
modal.style.display = "none";
}
}
</script>

</body>
</html>
