<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Assets</title>

<style>

body{
margin:0;
font-family:Arial;
background:#edf3ff;
padding-bottom:90px;
}

.header{

background:white;
padding:20px;

}

.wallet{

background:white;
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.balance{

font-size:28px;
font-weight:bold;
color:#1877f2;

}

.coin{

display:flex;
justify-content:space-between;
margin-top:15px;
padding-top:15px;
border-top:1px solid #ddd;

}

.bottom{

position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;

}

.bottom a{

text-decoration:none;
color:black;

}

</style>

</head>

<body>

<div class="header">

<h2>Assets</h2>

</div>

<div class="wallet">

<p>Total Portfolio</p>

<div class="balance">

$0.00

</div>

<div class="coin">

<div>

BTC

</div>

<div>

0.00000000

</div>

</div>


<div class="coin">

<div>

ETH

</div>

<div>

0.00000000

</div>

</div>


<div class="coin">

<div>

USDT

</div>

<div>

0.00000000

</div>

</div>

</div>


<div class="wallet">

<h3>Live Market</h3>

<div class="coin">

<div>Bitcoin</div>

<div id="btc">

Loading...

</div>

</div>

<div class="coin">

<div>Ethereum</div>

<div id="eth">

Loading...

</div>

</div>

</div>


<div class="bottom">

<a href="dashboard.html">
Home
</a>

<a href="invest.html">

</a>

<a href="trade.html">
Trade
</a>

<a href="assets.html">
Assets
</a>

<a href="profile.html">
Profile
</a>

</div>


<script>

async function loadPrices(){

try{

const response=
await fetch(
"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd"
);

const data=
await response.json();

document
.getElementById("btc")
.innerText=
"$"+data.bitcoin.usd;

document
.getElementById("eth")
.innerText=
"$"+data.ethereum.usd;

}

catch{

document
.getElementById("btc")
.innerText=
"Unavailable";

document
.getElementById("eth")
.innerText=
"Unavailable";

}

}

loadPrices();

</script>

</body>
</html>
