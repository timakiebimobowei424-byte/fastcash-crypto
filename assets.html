
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assets</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
background:linear-gradient(rgba(8,17,32,.88),rgba(8,17,32,.95));
color:white;
min-height:100vh;
overflow-x:hidden;
padding-bottom:90px;
}

#app{display:none;}

body::before{
content:"";
position:fixed;
width:500px;height:500px;
background:#22c55e;
filter:blur(180px);
top:-150px;left:-100px;
opacity:.2;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:450px;height:450px;
background:#3b82f6;
filter:blur(180px);
bottom:-150px;right:-100px;
opacity:.2;
z-index:-1;
}

.header{padding:25px}
.header h2{font-size:32px}
.header span{color:#22c55e}

.wallet{
background:rgba(17,24,39,.9);
margin:15px;
padding:25px;
border-radius:25px;
backdrop-filter:blur(12px);
}

.balance{
font-size:35px;
font-weight:bold;
color:#22c55e;
margin-top:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.stat{
background:#1f2937;
padding:12px;
border-radius:12px;
text-align:center;
}

.coin{
display:flex;
justify-content:space-between;
padding:15px 0;
border-top:1px solid rgba(255,255,255,.1);
}

.bottom{
position:fixed;
bottom:0;left:0;
width:100%;
display:flex;
justify-content:space-around;
padding:12px;
background:rgba(17,24,39,.95);
backdrop-filter:blur(15px);
}

.navItem{
display:flex;
flex-direction:column;
align-items:center;
text-decoration:none;
color:#cbd5e1;
font-size:12px;
}

.active{

background:rgba(34,197,94,.15);

color:#22c55e;

transform:translateY(-3px);

padding:10px 14px;

border-radius:14px;

}

#restricted{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.btn{
padding:15px 25px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
margin-top:20px;
cursor:pointer;
}

@media(max-width:600px){
.stats{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="restricted">
<h1>Access Restricted</h1>
<p>Please sign in to continue.</p>
<button class="btn" onclick="window.location='login.html'">Go To Login</button>
</div>

<div id="app">

<div class="header">
<h2>My <span>Assets</span></h2>
</div>

<div class="wallet">
<p>Total Portfolio</p>
<div class="balance">$0.00</div>

<div class="stats">
<div class="stat"><h3>BTC</h3><p>40%</p></div>
<div class="stat"><h3>ETH</h3><p>35%</p></div>
<div class="stat"><h3>USDT</h3><p>25%</p></div>
</div>
</div>

<div class="wallet">
<h3>Your Holdings</h3>

<div class="coin"><span>Bitcoin</span><span>$0.00</span></div>
<div class="coin"><span>Ethereum</span><span>$0.00</span></div>
<div class="coin"><span>USDT</span><span>$0.00</span></div>

</div>

<div class="wallet">
<h3>Live Market</h3>

<div class="coin"><span>Bitcoin</span><span id="btc">Loading...</span></div>
<div class="coin"><span>Ethereum</span><span id="eth">Loading...</span></div>

</div>

<div class="bottom">
<a href="dashboard.html" class="navItem">🏠<span>Home</span></a>
<a href="invest.html" class="navItem">💰<span>Invest</span></a>
<a href="trade.html" class="navItem">📈<span>Trade</span></a>
<a href="assets.html" class="navItem active">💼<span>Assets</span></a>
<a href="profile.html" class="navItem">👤<span>Profile</span></a>
</div>

</div>

<script>
async function loadPrices(){
try{
const response=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
const data=await response.json();

document.getElementById("btc").innerText="$"+data.bitcoin.usd;
document.getElementById("eth").innerText="$"+data.ethereum.usd;
}catch{
document.getElementById("btc").innerText="Unavailable";
document.getElementById("eth").innerText="Unavailable";
}
}
</script>

<script type="module">
import { auth } from "./config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const app=document.getElementById("app");
const restricted=document.getElementById("restricted");

onAuthStateChanged(auth,(user)=>{

if(user){
app.style.display="block";
restricted.style.display="none";
loadPrices();
}else{
app.style.display="none";
restricted.style.display="flex";
}

});
</script>

</body>
</html>
