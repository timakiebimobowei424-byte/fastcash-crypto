<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1220;
color:white;
}

.header{

padding:20px;
background:#121a2c;
display:flex;
justify-content:space-between;
align-items:center;

}

.header h2{

margin:0;

}

.container{

padding:20px;

}

.stats{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;

}

.card{

background:#1c2433;
padding:20px;
border-radius:15px;
box-shadow:
0 2px 10px rgba(0,0,0,.4);

}

.number{

font-size:28px;
font-weight:bold;
margin-top:10px;

}

.actions{

margin-top:25px;

}

.actionBtn{

width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1877f2;
color:white;
font-size:15px;

}

.logout{

background:red;

}

</style>

</head>

<body>

<div class="header">

<h2>
Admin Dashboard
</h2>

<p>
Secure Access
</p>

</div>


<div class="container">

<div class="stats">

<div class="card">

<p>Total Users</p>

<div class="number"
id="users">

0

</div>

</div>


<div class="card">

<p>Pending Deposits</p>

<div class="number"
id="deposits">

0

</div>

</div>


<div class="card">

<p>Pending Withdrawals</p>

<div class="number"
id="withdrawals">

0

</div>

</div>


<div class="card">

<p>Total Transactions</p>

<div class="number"
id="transactions">

0

</div>

</div>

</div>


<div class="actions">

<button
class="actionBtn"
onclick="window.location='admin-fund.html'">

Fund Users

</button>


<button
class="actionBtn"
onclick="window.location='admin-deposits.html'">

Approve Deposits

</button>


<button
class="actionBtn"
onclick="window.location='admin-withdrawals.html'">

Approve Withdrawals

</button>
























<button
class="actionBtn logout"
id="logoutBtn">

Logout

</button>

</div>

</div>


<script
type="module"
src="admin-guard.js">
</script>

<script
type="module">

import {auth}
from "./config.js";

import {
signOut
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

document
.getElementById(
"logoutBtn"
)

.onclick=()=>{

signOut(auth);

window.location=
"admin-login.html";

};

</script>

</body>

</html>
