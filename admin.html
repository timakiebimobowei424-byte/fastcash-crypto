<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>FastCash Crypto Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
visibility:hidden;
background:#081120;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{

width:230px;
background:#111827;
padding:20px;

}

.sidebar h2{

margin-bottom:30px;

}

.sidebar a{

display:block;
text-decoration:none;
color:#cbd5e1;
padding:14px;
border-radius:12px;
margin:10px 0;

}

.sidebar a:hover,
.active{

background:
rgba(34,197,94,.15);

color:#22c55e;

}

.main{

flex:1;
padding:25px;

}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;
margin-top:25px;

}

.card{

background:#111827;
padding:25px;
border-radius:20px;

}

.number{

font-size:35px;
margin-top:10px;
color:#22c55e;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>
Admin Panel
</h2>

<a
href="admin.html"
class="active">

🏠 Dashboard

</a>

<a
href="admin.fund.html">

💰 Fund User

</a>

<a
href="admin.deposits.html">

📥 Deposits

</a>

<a
href="admin.withdrawal.html">

📤 Withdrawals

</a>

<a
href="#"
id="logoutBtn">

🚪 Logout

</a>

</div>

<div class="main">

<h1>

Dashboard

</h1>

<div class="cards">

<div class="card">

<h3>
Total Users
</h3>

<div
id="totalUsers"
class="number">

0

</div>

</div>

<div class="card">

<h3>
Pending Deposits
</h3>

<div
id="pendingDeposits"
class="number">

0

</div>

</div>

<div class="card">

<h3>
Pending Withdrawals
</h3>

<div
id="pendingWithdrawals"
class="number">

0

</div>

</div>

<div class="card">

<h3>
Transactions
</h3>

<div
id="transactions"
class="number">

0

</div>

</div>

</div>

</div>

<script
type="module"
src="./admin-stats.js">
</script>

<script
type="module"
src="./admin.guard.js">
</script>

</body>
</html>
