<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Marks Investment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080d18;
color:white;
}

.hero{

height:100vh;

background:
linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.8)
),

url("https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=1200");

background-size:cover;
background-position:center;

padding:30px;
}

.logo{

font-size:30px;
font-weight:bold;
margin-top:20px;

}

.logo span{
color:gold;
}

.hero-content{

margin-top:100px;

}

.hero-content h1{

font-size:42px;
line-height:1.3;

}

.hero-content p{

margin-top:20px;
font-size:18px;
color:#ccc;

}

.btn{

display:block;
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;

}

.start{

background:gold;
color:black;
font-weight:bold;

}

.login{

background:transparent;
border:2px solid gold;
color:white;

}

.card{

background:#121b2d;
margin:20px;
padding:25px;
border-radius:20px;

}

.card h2{
margin-bottom:15px;
}

.crypto{

font-size:35px;
color:gold;

}

</style>

</head>

<body>

<section class="hero">

<div class="logo">

Marks<span>Investment</span>

</div>

<div class="hero-content">

<h1>
Start Trading The World's Most Powerful Investments
</h1>

<p>

Trade Bitcoin, Ethereum and invest securely from anywhere.

</p>

<button class="btn start">

Get Started →

</button>

<button
class="btn login"
onclick="window.location.href='register.html'">

Sign In

</button>

</div>

</section>

<section class="card">

<h2>Bitcoin Price</h2>

<div class="crypto">

$67,093

</div>

<p>Updated just now</p>

</section>
<section style="padding:20px;">

<h2 style="
text-align:center;
margin-bottom:25px;">
Live Market
</h2>

<div class="card">

<h3>Bitcoin</h3>

<div class="crypto">
$67,093
</div>

<p>+3.7% today</p>

</div>


<div class="card">

<h3>Ethereum</h3>

<div class="crypto">
$3,540
</div>

<p>+2.4% today</p>

</div>


<div class="card">

<h3>USDT</h3>

<div class="crypto">
$1.00
</div>

<p>Stable Coin</p>

</div>

</section>
</body>
</html>
