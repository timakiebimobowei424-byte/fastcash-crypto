<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mark Investment Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#081120;
overflow:hidden;
color:white;

}

.bg{

position:absolute;
width:100%;
height:100%;
background:
linear-gradient(
135deg,
#081120,
#111827
);

}

.card{

position:relative;
width:90%;
max-width:450px;
background:rgba(17,24,39,.95);
padding:30px;
border-radius:20px;
z-index:10;

}

h1{

text-align:center;
margin-bottom:20px;

}

input{

width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:8px;

}

button{

width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:8px;
cursor:pointer;

}

.loginBtn{

background:#22c55e;
color:white;

}

.forgot{

text-align:center;
margin-top:15px;
cursor:pointer;
color:#22c55e;

}

.register{

text-align:center;
margin-top:15px;

}

.register a{

color:#22c55e;
text-decoration:none;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="card">

<h1>Login</h1>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
class="loginBtn"
id="loginBtn">

Sign In

</button>

<p
class="forgot"
id="forgotBtn">

Forgot Password?

</p>

<div class="register">

No account?

<a href="register.html">

Create Account

</a>

</div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
