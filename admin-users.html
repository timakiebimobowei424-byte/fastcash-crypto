<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Users - FastCash Crypto</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background:#081120;color:white;padding:20px}h1{margin-bottom:20px}.box{background:#111827;padding:20px;border-radius:20px;margin-bottom:20px}input,button{padding:12px;border:none;border-radius:10px;margin:8px 0}input{width:100%;background:#1f2937;color:white}button{background:#22c55e;color:white;cursor:pointer}.user{background:#1f2937;padding:15px;border-radius:12px;margin-top:10px}</style></head><body><h1>Users</h1><div class="box"><input id="search" placeholder="Search email"><button id="searchBtn">Search User</button></div><div class="box"><input id="fundEmail" placeholder="User Email"><input id="amount" type="number" placeholder="Amount"><button id="fundBtn">Fund User</button></div><div id="results"></div><script type="module">import {db} from './config.js';import {collection,getDocs,query,where,updateDoc,doc,increment} from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js';document.getElementById('searchBtn').onclick=async()=>{const email=document.getElementById('search').value;const q=query(collection(db,'users'),where('email','==',email));const snap=await getDocs(q);const results=document.getElementById('results');results.innerHTML='';snap.forEach(d=>{results.innerHTML+=`<div class=user>${d.data().email}</div>`})};document.getElementById('fundBtn').onclick=async()=>{const email=document.getElementById('fundEmail').value;const amount=Number(document.getElementById('amount').value);const q=query(collection(db,'users'),where('email','==',email));const snap=await getDocs(q);snap.forEach(async(d)=>{await updateDoc(doc(db,'users',d.id),{balance:increment(amount)});alert('Fund successful');});}</script></body></html>
