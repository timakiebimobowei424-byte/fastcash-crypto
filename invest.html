<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Investment Plans</title>

<style>

body{

margin:0;
font-family:Arial;
background:#edf3ff;
padding-bottom:90px;

}

.header{

padding:20px;
background:white;

}

.plan{

background:white;
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:
0 2px 10px rgba(0,0,0,.1);

}

.green{

background:#0ca443;
color:white;
padding:20px;
border-radius:10px;

}

button{

background:#1877f2;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
margin-top:15px;

}

.modal{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);

justify-content:center;
align-items:center;

}

.box{

background:white;
padding:25px;
width:80%;
border-radius:15px;

}

input{

width:100%;
padding:12px;
margin-top:10px;

}

.bottom{

position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;

}

.bottom a{

text-decoration:none;
color:black;

}

</style>

</head>

<body>

<div class="header">

<h2>Investment Plans</h2>

</div>

<div class="plan">

<div class="green">

<h2>Basic Plan</h2>

<p>Duration: 1 Week</p>

<p>Profit: 10% + Capital</p>

</div>

<p>Minimum: $700</p>

<p>Maximum: $2500</p>

<button onclick="openInvest()">

Invest

</button>

</div>


<div class="plan">

<div class="green">

<h2>Silver Plan</h2>

<p>Duration: 1 Week</p>

<p>Profit: 15% + Capital</p>

</div>

<p>Minimum: $2001</p>

<p>Maximum: $5000</p>

<button onclick="openInvest()">

Invest

</button>

</div>


<div class="modal"
id="investModal">

<div class="box">

<h3>

Enter Amount

</h3>

<input
type="number"
id="amount"
placeholder="USD Amount">

<button
id="confirmInvest">

Continue

</button>

</div>

</div>


<div class="bottom">

<a href="dashboard.html">
Home
</a>

<a href="invest.html">
Invest
</a>

<a href="trade.html">
Trade
</a>

<a href="assets.html">
Assets
</a>

<a href="profile.html">
Profile
</a>

</div>


<script>

function openInvest(){

document
.getElementById(
"investModal"
)
.style.display=
"flex";

}

document
.getElementById(
"confirmInvest"
)

.onclick=function(){

let amount=

document
.getElementById(
"amount"
)
.value;

if(amount<1){

alert(
"Enter amount"
);

return;

}

alert(

"Investment request: $"
+amount

);

};

</script>

</body>
</html>
