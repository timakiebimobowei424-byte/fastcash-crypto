<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;
padding-bottom:90px;
overflow-x:hidden;
color:white;

background:
linear-gradient(
rgba(8,17,32,.88),
rgba(8,17,32,.95)
);

}

body::before{

content:"";
position:fixed;
width:500px;
height:500px;

background:#22c55e;

filter:blur(180px);

top:-150px;
left:-100px;

opacity:.2;

animation:move1 10s infinite alternate;

}

body::after{

content:"";
position:fixed;
width:450px;
height:450px;

background:#3b82f6;

filter:blur(180px);

bottom:-150px;
right:-100px;

opacity:.2;

animation:move2 10s infinite alternate;

}

@keyframes move1{

100%{

transform:
translate(150px,100px);

}

}

@keyframes move2{

100%{

transform:
translate(-150px,-100px);

}

}

.header{

padding:25px;
text-align:center;

}

.header h2{

font-size:32px;

}

.header span{

color:#22c55e;

}

.card{

background:
rgba(17,24,39,.9);

margin:15px;

padding:25px;

border-radius:25px;

backdrop-filter:blur(12px);

box-shadow:
0 0 30px rgba(0,0,0,.4);

position:relative;

}

.avatar{

width:110px;
height:110px;

border-radius:50%;

margin:auto;

display:flex;
justify-content:center;
align-items:center;

font-size:35px;
font-weight:bold;

background:
linear-gradient(
135deg,
#22c55e,
#3b82f6
);

}

.status{

margin-top:15px;
text-align:center;

color:#22c55e;

font-size:14px;

}

.stats{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:10px;

margin-top:25px;

}

.stat{

background:#1f2937;

padding:12px;

border-radius:12px;

text-align:center;

}

.stat h3{

color:#22c55e;
margin-bottom:5px;

}

.input-group{

margin-top:15px;

}

input{

width:100%;
padding:16px;

border:none;
outline:none;

border-radius:12px;

background:#1f2937;

color:white;

}

input::placeholder{

color:#94a3b8;

}

button{

width:100%;
padding:16px;

margin-top:20px;

border:none;

border-radius:12px;

background:#22c55e;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:
translateY(-2px);

}

.security{

background:#1f2937;

padding:15px;

border-radius:15px;

margin-top:20px;

}

.security p{

margin-top:10px;
color:#cbd5e1;

}

.bottom{

position:fixed;
bottom:0;
left:0;
width:100%;

display:flex;
justify-content:space-around;
align-items:center;

padding:12px;

background:
rgba(17,24,39,.95);

backdrop-filter:blur(15px);

z-index:9999;

border-top:
1px solid rgba(255,255,255,.08);

}

.navItem{

display:flex;
flex-direction:column;
align-items:center;

text-decoration:none;

color:#cbd5e1;

padding:10px 14px;

border-radius:14px;

transition:.3s;

font-size:12px;

}

.icon{

font-size:20px;
margin-bottom:5px;

}

.navItem:hover{

background:
rgba(34,197,94,.15);

color:#22c55e;

transform:
translateY(-3px);

}

.active{

background:
rgba(34,197,94,.15);

color:#22c55e;

}

text-decoration:none;
color:white;

}

.bottom a:hover{

color:#22c55e;

}

@media(max-width:600px){

.stats{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="header">

<h2>

My <span>Profile</span>

</h2>

</div>

<div class="card">

<div class="avatar">

TE

</div>

<div class="status">

🟢 Verified Investor Account

</div>

<div class="stats">

<div class="stat">

<h3>$0</h3>
<p>Assets</p>

</div>

<div class="stat">

<h3>0</h3>
<p>Trades</p>

</div>

<div class="stat">

<h3>0%</h3>
<p>Profit</p>

</div>

</div>

<div class="input-group">

<input
id="firstName"
placeholder="First Name">

</div>

<div class="input-group">

<input
id="surname"
placeholder="Surname">

</div>

<div class="input-group">

<input
id="email"
placeholder="Email">

</div>

<div class="input-group">

<input
id="phone"
placeholder="Phone Number">

</div>

<button
id="updateBtn">

Update Profile

</button>

<div class="security">

<h3>

Security Center

</h3>

<p>

🔒 Account Protection Active

</p>

<p>

📧 Email Verification Enabled

</p>

<p>

🛡 Investment Security Level: High

</p>

</div>

</div>

<div class="bottom">

<a href="dashboard.html" class="navItem active">

<div class="icon">🏠</div>
<span>Home</span>

</a>

<a href="invest.html" class="navItem">

<div class="icon">💰</div>
<span>Invest</span>

</a>

<a href="trade.html" class="navItem">

<div class="icon">📈</div>
<span>Trade</span>

</a>

<a href="assets.html" class="navItem">

<div class="icon">💼</div>
<span>Assets</span>

</a>

<a href="profile.html" class="navItem">

<div class="icon">👤</div>
<span>Profile</span>

</a>

</div>

<script
type="module"
src="profile.js">
</script>

</body>
</html>
