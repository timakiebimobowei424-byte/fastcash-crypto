<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Withdraw</title>

<style>

body{
font-family:Arial;
background:#edf3ff;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
background:#1877f2;
color:white;
border-radius:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Withdraw Funds</h2>

<input id="name" placeholder="Account Name">
<input id="number" placeholder="Account Number">
<input id="bank" placeholder="Bank Name">
<input id="amount" type="number" placeholder="Amount (USD)">

<button id="withdrawBtn">Submit Withdrawal</button>

</div>

<script type="module" src="withdraw.js"></script>

</body>

</html>
