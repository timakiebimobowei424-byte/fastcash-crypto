<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Withdraw</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;
padding:20px;
color:white;
overflow-x:hidden;

background:
linear-gradient(
rgba(8,17,32,.88),
rgba(8,17,32,.95)
);

}

body::before{

content:"";
position:fixed;
width:500px;
height:500px;
background:#22c55e;
filter:blur(180px);

top:-150px;
left:-100px;

opacity:.2;

animation:move1 10s infinite alternate;

}

body::after{

content:"";
position:fixed;
width:450px;
height:450px;
background:#3b82f6;
filter:blur(180px);

bottom:-150px;
right:-100px;

opacity:.2;

animation:move2 10s infinite alternate;

}

@keyframes move1{

100%{

transform:
translate(150px,100px);

}

}

@keyframes move2{

100%{

transform:
translate(-150px,-100px);

}

}

.container{

max-width:550px;
margin:auto;
position:relative;
z-index:2;

}

.header{

text-align:center;
margin-bottom:25px;

}

.header h1{

font-size:32px;

}

.header span{

color:#22c55e;

}

.header p{

margin-top:10px;
color:#cbd5e1;

}

.card{

background:
rgba(17,24,39,.90);

backdrop-filter:blur(12px);

padding:25px;

border-radius:25px;

box-shadow:
0 0 35px rgba(0,0,0,.4);

}

.balanceCard{

background:#1f2937;

padding:15px;

border-radius:15px;

margin-bottom:20px;

text-align:center;

}

.balanceCard p{

color:#94a3b8;

}

.balanceCard h2{

margin-top:8px;
color:#22c55e;

}

.input-group{

margin-top:15px;

}

input{

width:100%;

padding:16px;

border:none;
outline:none;

background:#1f2937;

border-radius:12px;

color:white;

font-size:15px;

}

input::placeholder{

color:#94a3b8;

}

button{

width:100%;

padding:16px;

margin-top:20px;

border:none;

border-radius:12px;

background:#22c55e;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:
translateY(-2px);

}

.info{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:10px;
margin-top:25px;

}

.box{

background:#1f2937;

padding:12px;

border-radius:12px;

text-align:center;

}

.box h4{

margin-bottom:5px;

}

.box p{

font-size:12px;
color:#cbd5e1;

}

.notice{

margin-top:20px;
padding:15px;

background:#1f2937;

border-radius:12px;

font-size:13px;

color:#cbd5e1;

}

@media(max-width:600px){

.info{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>

FastCash <span>Crypto</span>

</h1>

<p>

Secure Withdrawal Center

</p>

</div>

<div class="card">

<div class="balanceCard">

<p>Available Balance</p>

<h2>$0.00</h2>

</div>

<div class="input-group">

<input
id="name"
placeholder="Account Name">

</div>

<div class="input-group">

<input
id="number"
placeholder="Account Number">

</div>

<div class="input-group">

<input
id="bank"
placeholder="Bank Name">

</div>

<div class="input-group">

<input
id="amount"
type="number"
placeholder="Amount (USD)">

</div>

<button id="withdrawBtn">

Submit Withdrawal

</button>

<div class="notice">

🔒 Withdrawals are protected with secure processing and verification. Processing time may vary depending on payment method.

</div>

<div class="info">

<div class="box">

<h4>Bank</h4>
<p>1–24 hrs</p>

</div>

<div class="box">

<h4>Secure</h4>
<p>Verified</p>

</div>

<div class="box">

<h4>Status</h4>
<p>Protected</p>

</div>

</div>

</div>

</div>

<script
type="module"
src="withdraw.js"></script>

</body>
</html>
