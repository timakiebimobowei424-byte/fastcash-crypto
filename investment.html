<!DOCTYPE html>
<html>
<head>

<title>Investment Plans</title>

<style>

body{
background:#081120;
color:white;
font-family:Arial;
}

.container{
padding:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.plan{
background:#111827;
padding:25px;
border-radius:15px;
}

button{
padding:12px;
width:100%;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
}

</style>

</head>

<body>

<h1 style="padding:30px">
Investment Plans
</h1>

<div class="container">

<div class="plan">

<h2>Basic</h2>

<p>Duration: 1 Week</p>
<p>Profit: 10%</p>
<p>Min: $700</p>

<button>Invest</button>

</div>

<div class="plan">

<h2>Silver</h2>

<p>Duration: 1 Week</p>
<p>Profit: 15%</p>
<p>Min: $2000</p>

<button>Invest</button>

</div>

<div class="plan">

<h2>Gold</h2>

<p>Duration: 2 Weeks</p>
<p>Profit: 25%</p>
<p>Min: $5000</p>

<button>Invest</button>

</div>

</div>

</body>
</html>
