
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Withdrawals - FastCash Crypto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#081120;color:white;padding:20px}
h1{margin-bottom:20px}
.box{background:#111827;padding:18px;border-radius:15px;margin-bottom:15px}
button{padding:10px 15px;border:none;border-radius:10px;cursor:pointer;margin-top:10px;margin-right:10px}
.approve{background:#22c55e;color:white}
.reject{background:#ef4444;color:white}
</style>
</head>
<body>

<h1>Pending Withdrawals</h1>
<div id="container">Loading...</div>

<script type="module">

import { db } from "./config.js";

import {
collection,
getDocs,
query,
where,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const container=document.getElementById("container");

async function loadWithdrawals(){

const q=query(
collection(db,"withdrawals"),
where("status","==","pending")
);

const snap=await getDocs(q);

container.innerHTML="";

if(snap.empty){

container.innerHTML="No pending withdrawals";
return;

}

snap.forEach((d)=>{

const data=d.data();

container.innerHTML+=`

<div class="box">

<p><b>User:</b> ${data.uid||"Unknown"}</p>

<p><b>Amount:</b> $${data.amount||0}</p>

<button
class="approve"
onclick="approveWithdrawal('${d.id}')">

Approve

</button>

<button
class="reject"
onclick="rejectWithdrawal('${d.id}')">

Reject

</button>

</div>

`;

});

}

window.approveWithdrawal=async(id)=>{

await updateDoc(
doc(db,"withdrawals",id),
{status:"approved"}
);

alert("Withdrawal approved");

loadWithdrawals();

}

window.rejectWithdrawal=async(id)=>{

await updateDoc(
doc(db,"withdrawals",id),
{status:"rejected"}
);

alert("Withdrawal rejected");

loadWithdrawals();

}

loadWithdrawals();

</script>

</body>
</html>
