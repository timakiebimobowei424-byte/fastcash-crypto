
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deposits - FastCash Crypto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#081120;color:white;padding:20px}
h1{margin-bottom:20px}
.deposit{
background:#111827;
padding:18px;
margin-bottom:15px;
border-radius:15px
}
button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin-right:10px;
margin-top:10px
}
.approve{background:#22c55e;color:white}
.reject{background:#ef4444;color:white}
</style>
</head>
<body>

<h1>Pending Deposits</h1>

<div id="container">Loading...</div>

<script type="module">

import { db } from "./config.js";

import {
collection,
getDocs,
updateDoc,
doc,
query,
where
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const container=
document.getElementById("container");

async function loadDeposits(){

container.innerHTML="Loading...";

const q=
query(
collection(db,"deposits"),
where("status","==","pending")
);

const snap=await getDocs(q);

container.innerHTML="";

if(snap.empty){

container.innerHTML=
"No pending deposits";

return;

}

snap.forEach((d)=>{

const data=d.data();

container.innerHTML+=`

<div class="deposit">

<p><b>User:</b>
${data.uid||"Unknown"}
</p>

<p><b>Amount:</b>
$${data.amount||0}
</p>

<button
class="approve"
onclick="approveDeposit('${d.id}')">

Approve

</button>

<button
class="reject"
onclick="rejectDeposit('${d.id}')">

Reject

</button>

</div>

`;

});

}

window.approveDeposit=
async(id)=>{

await updateDoc(
doc(db,"deposits",id),
{status:"approved"}
);

alert("Deposit approved");

loadDeposits();

}

window.rejectDeposit=
async(id)=>{

await updateDoc(
doc(db,"deposits",id),
{status:"rejected"}
);

alert("Deposit rejected");

loadDeposits();

}

loadDeposits();

</script>

</body>
</html>
